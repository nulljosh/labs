name: Grapher
options:
  bundleIdPrefix: com.nulljosh
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Grapher-iOS:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: web
        buildPhase: resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.grapher
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        # ponytail: no AppIcon asset catalog yet — generate one from icon.svg before App Store submission

schemes:
  Grapher-iOS:
    build:
      targets:
        Grapher-iOS: all
    run:
      config: Debug
    archive:
      config: Release
    shared: true
