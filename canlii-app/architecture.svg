<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220" font-family="-apple-system,sans-serif">
  <rect width="800" height="220" fill="#101728"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7a8aa8"/>
    </marker>
  </defs>

  <rect x="30" y="30" width="150" height="55" rx="10" fill="#1a2436" stroke="#c0392b" stroke-width="1.5"/>
  <text x="105" y="62" font-size="12" fill="#e5e7eb" text-anchor="middle">iOS app</text>

  <rect x="30" y="135" width="150" height="55" rx="10" fill="#1a2436" stroke="#c0392b" stroke-width="1.5"/>
  <text x="105" y="167" font-size="12" fill="#e5e7eb" text-anchor="middle">web/ wrapper</text>

  <path d="M180 58 L300 100" stroke="#7a8aa8" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M180 162 L300 110" stroke="#7a8aa8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="310" y="80" width="190" height="55" rx="10" fill="#2a1414" stroke="#c0392b" stroke-width="2"/>
  <text x="405" y="103" font-size="12" font-weight="600" fill="#e07a6c" text-anchor="middle">Vercel Edge functions</text>
  <text x="405" y="120" font-size="10" fill="#9aa4b8" text-anchor="middle">/api/databases, /api/search</text>

  <path d="M500 107 L620 107" stroke="#7a8aa8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="630" y="80" width="150" height="55" rx="10" fill="#1a2436" stroke="#c0392b" stroke-width="1.5"/>
  <text x="705" y="103" font-size="12" fill="#e5e7eb" text-anchor="middle">CanLII API</text>
  <text x="705" y="120" font-size="10" fill="#9aa4b8" text-anchor="middle">api.canlii.org</text>

  <text x="405" y="200" font-size="10" fill="#7a8aa8" text-anchor="middle">CANLII_API_KEY stays server-side, never shipped to clients</text>
